<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        :root {
            color-scheme: light;
            font-family: 'Inter', Arial, sans-serif;
            --brand: #E61A52;
            --dark: #2b1b6c;
            --white: #ffffff;
            --text: #111;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #fff;
            color: var(--text);
        }

        .navbar {
            width: 100%;
        }

        .marquee-bar {
            background: #6048A0;
            color: var(--white);
            font-size: 0.85rem;
            padding: 10px 0;
            overflow: hidden;
        }

        .marquee-bar .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 18s linear infinite;
        }

        @keyframes marquee {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(-100%);
            }
        }

        .top-bar,
        .main-bar,
        .categories-bar {
            width: 100%;
        }

        .top-bar {
            background: var(--brand);
            color: var(--white);
            padding: 10px 20px;
        }

        .top-bar .top-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .top-bar .top-text {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .top-bar .top-links {
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .top-bar .top-links a {
            color: var(--white);
            text-decoration: none;
        }

        .top-bar .top-links .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 50%;
            font-size: 0.85rem;
        }

        .main-bar {
            background: var(--brand);
            padding: 18px 20px;
        }

        .main-bar .main-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(120px, auto) 1fr minmax(240px, auto);
            align-items: center;
            gap: 20px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .logo-wrap img {
            height: 48px;
            width: auto;
            display: block;
        }

        .search-box {
            width: 100%;
        }

        .search-box form {
            display: flex;
            align-items: center;
            width: 100%;
            background: var(--white);
            border-radius: 999px;
            padding: 10px 16px;
            gap: 10px;
        }

        .search-box input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 0.98rem;
            color: #111;
            background: transparent;
        }

        .search-box button {
            border: none;
            background: transparent;
            cursor: pointer;
            color: #111;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .action-group {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            flex-wrap: wrap;
        }

        .action-group .cta {
            background: var(--white);
            color: var(--brand);
            border: none;
            padding: 12px 20px;
            border-radius: 999px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            white-space: nowrap;
        }

        .icon-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.35);
            cursor: pointer;
        }

        .categories-bar {
            background: var(--brand);
            padding: 16px 20px;
        }

        .categories-bar .categories-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
        }

        .categories-bar a {
            color: var(--white);
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        @media (max-width: 940px) {
            .main-bar .main-inner {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .action-group {
                justify-content: center;
            }

            .logo-wrap {
                justify-content: center;
            }
        }

        @media (max-width: 640px) {

            .top-bar .top-inner,
            .categories-bar .categories-inner {
                flex-direction: column;
                align-items: center;
            }

            .top-bar .top-links {
                justify-content: center;
                gap: 14px;
            }

            .main-bar {
                padding: 16px 14px;
            }

            .main-bar .main-inner {
                gap: 16px;
            }

            .action-group {
                gap: 10px;
            }

            .search-box form {
                padding: 10px 14px;
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="marquee-bar">
            <div class="marquee-content">Grab Your Discount Today... Toy Bonanza: Upto 30% Off on Outdoor Toys | Unlock
                Joy: Enjoy 20% Off Your First Order! | Play More, Pay Less: Perfect Time To Grab Your Deals!</div>
        </div>

        <div class="top-bar">
            <div class="top-inner">
                <div class="top-text">BUYING IN BULK?...CLICK HERE</div>
                <div class="top-links">
                    <a href="#">Delivery Information</a>
                    <a href="#">Track My Order</a>
                    <a href="#">FAQs</a>
                    <span class="icon">🕒</span>
                </div>
            </div>
        </div>

        <div class="main-bar">
            <div class="main-inner">
                <div class="logo-wrap">
                    <img src="images/logo.png" alt="Logo">
                </div>

                <div class="search-box">
                    <form action="#">
                        <input type="search" placeholder="Search for toys..." aria-label="Search for toys">
                        <button type="submit" aria-label="Search">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
                                    stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                <path d="M21 21L16.65 16.65" stroke="#111" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </button>
                    </form>
                </div>

                <div class="action-group">
                    <button class="cta">Wholesale Deals</button>
                    <button class="icon-button" aria-label="Cart">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 6H21L20 14H8L6 6Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M6 6L4 2H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path
                                d="M9 20C9.55228 20 10 19.5523 10 19C10 18.4477 9.55228 18 9 18C8.44772 18 8 18.4477 8 19C8 19.5523 8.44772 20 9 20Z"
                                stroke="currentColor" stroke-width="2" />
                            <path
                                d="M18 20C18.5523 20 19 19.5523 19 19C19 18.4477 18.5523 18 18 18C17.4477 18 17 18.4477 17 19C17 19.5523 17.4477 20 18 20Z"
                                stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                    <button class="icon-button" aria-label="User">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 21V19C20 16.7909 18.2091 15 16 15H8C5.79086 15 4 16.7909 4 19V21"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                                d="M12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="categories-bar">
            <div class="categories-inner">
                <a href="./index.html">Home</a>
                <a href="./categories.html">Categories</a>
                <a href="#">Best Seller</a>
                <a href="how-to-order.html">How to Order</a>
                <a href="#">Blog</a>
            </div>
        </div>
    </div>
</body>

</html>
